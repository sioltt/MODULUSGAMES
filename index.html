<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AEVITAS | ELITE</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="aevitas-app">
    <!-- HOME SCREEN -->
    <section id="home-screen" class="screen active">
        <header class="home-header">
            <h1>AEVITAS<span>VAULT</span></h1>
            <p>SELECT A MODULE TO INITIALIZE</p>
        </header>

        <div class="game-grid">
            <!-- Game Card: Retro Bowl -->
            <div class="game-card" onclick="launchGame('retro-bowl')">
                <div class="card-glow"></div>
                <img src="./assets/thumbnails/retro-bowl.png" alt="Retro Bowl">
                <span>RETRO BOWL</span>
            </div>

            <!-- Game Card: BitLife -->
            <div class="game-card" onclick="launchGame('bitlife')">
                <div class="card-glow"></div>
                <img src="./assets/thumbnails/bitlife.png" alt="BitLife">
                <span>BITLIFE</span>
            </div>

            <!-- Game Card: Slope -->
            <div class="game-card" onclick="launchGame('slope')">
                <div class="card-glow"></div>
                <img src="./assets/thumbnails/slope.png" alt="Slope">
                <span>SLOPE</span>
            </div>
        </div>
    </section>

    <!-- GAME STAGE SCREEN -->
    <section id="game-stage" class="screen">
        <div class="stage-controls">
            <button class="control-btn exit-btn" onclick="backToMenu()">← MAIN MENU</button>
            <h2 id="current-title">SYSTEM ACTIVE</h2>
            <button class="control-btn full-btn" onclick="toggleFullscreen()">FULLSCREEN</button>
        </div>
        
        <div class="iframe-container" id="stage-wrapper">
            <iframe id="game-frame" src="" frameborder="0" allowfullscreen></iframe>
        </div>
    </section>
</div>

<script src="script.js"></script>
</body>
</html>
