<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AEVITAS | ELITE</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>

    <div id="home-screen" class="screen active">
        <div class="vault-header">
            <h1>AEVITAS<span>ELITE</span></h1>
            <p>GIGABYTE, AUSTIN, AIDAN</p>
        </div>

        <div class="game-grid">
            <div class="game-card" onclick="launchGame('retro-bowl')">
                <div class="card-inner">
                    <img src="./assets/thumbnails/retro-bowl.png" alt="Retro Bowl">
                    <span>RETRO BOWL</span>
                </div>
            </div>
            <div class="game-card" onclick="launchGame('bitlife')">
                <div class="card-inner">
                    <img src="./assets/thumbnails/bitlife.png" alt="BitLife">
                    <span>BITLIFE</span>
                </div>
            </div>
            <div class="game-card" onclick="launchGame('slope')">
                <div class="card-inner">
                    <img src="./assets/thumbnails/slope.png" alt="Slope">
                    <span>SLOPE</span>
                </div>
            </div>
        </div>
    </div>

    <div id="game-stage" class="screen">
        <div class="top-nav">
            <div class="nav-group">
                <button class="nav-btn" onclick="backToMenu()">MAIN MENU</button>
                <button class="nav-btn cloak-btn" onclick="goToClassroom()">CLASSROOM</button>
            </div>
            <h2 id="current-title">INITIALIZING...</h2>
            <button class="nav-btn" onclick="toggleFullscreen()">FULLSCREEN</button>
        </div>
        
        <div class="iframe-wrapper" id="stage-wrapper">
            <iframe id="game-frame" src="" frameborder="0" allowfullscreen></iframe>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
